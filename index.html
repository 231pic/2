<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>231 | Minimalist Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Preloader -->
    <div id="loader" class="loader-wrapper">
        <div class="loader-content">
            <span class="loader-text">231</span>
            <div class="loader-bar"></div>
        </div>
    </div>

    <div class="grain-overlay"></div>

    <header>
        <nav>
            <div class="logo">231</div>
            <ul class="nav-links">
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#guestbook">Guestbook</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Capturing the <span>Essence</span> of Silence</h1>
                <p>A curated collection of moments, light, and shadows.</p>
            </div>
        </section>

        <!-- Horizontal Polaroid Gallery -->
        <section id="gallery" class="gallery-slider-section">
            <div class="slider-container">
                <div id="photo-gallery" class="photo-track">
                    <!-- Polaroids will be injected and duplicated for infinite effect -->
                </div>
            </div>
        </section>

        <!-- Selected Photo Detail View -->
        <section id="photo-detail" class="photo-detail" style="display: none;">
            <div class="detail-container">
                <button class="close-detail">&times; Close</button>
                <div class="detail-content">
                    <img id="detail-img" src="" alt="">
                    <div class="detail-info">
                        <h2 id="detail-title"></h2>
                        <p id="detail-category"></p>
                        <div class="detail-comments">
                            <div id="disqus_thread"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="guestbook" class="guestbook">
            <div class="guestbook-container">
                <h2>Guestbook</h2>
                <p>소중한 방문 소감을 남겨주세요.</p>
                <form id="guestbook-form" class="guestbook-form">
                    <div class="form-group">
                        <label for="gb-name">성함</label>
                        <input type="text" id="gb-name" name="name" placeholder="성함을 입력해주세요" required>
                    </div>
                    <div class="form-group">
                        <label for="gb-message">내용</label>
                        <textarea id="gb-message" name="message" rows="3" placeholder="방명록 내용을 입력해주세요" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">방명록 남기기</button>
                </form>
                <div id="guestbook-entries" class="guestbook-entries"></div>
            </div>
        </section>

        <section id="contact" class="contact">
            <div class="contact-container">
                <h2>Partnership Inquiry</h2>
                <p>제휴 및 협업 제안을 남겨주시면 검토 후 연락드리겠습니다.</p>
                <form action="https://formspree.io/f/mqeypbgy" method="POST">
                    <div class="form-group">
                        <label for="name">성함</label>
                        <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" placeholder="example@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="5" placeholder="제휴 제안 내용을 상세히 입력해주세요" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의 보내기</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 231. All Rights Reserved.</p>
            <div class="socials">
                <a href="https://www.instagram.com/231pic/" target="_blank">Instagram</a>
                <a href="#">VSCO</a>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.origin;
            this.page.identifier = 'home';
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://231pic.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
