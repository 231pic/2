<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>231 | Minimalist Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">231</div>
            <ul class="nav-links">
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Capturing the <span>Essence</span> of Silence</h1>
                <p>A curated collection of moments, light, and shadows.</p>
            </div>
        </section>

        <section id="gallery" class="gallery">
            <div class="gallery-grid" id="photo-gallery">
                <!-- Photos will be injected here by JavaScript -->
            </div>
        </section>

        <section id="contact" class="contact">
            <div class="contact-container">
                <h2>Partnership Inquiry</h2>
                <p>제휴 및 협업 제안을 남겨주시면 검토 후 연락드리겠습니다.</p>
                <div class="contact-social">
                    <a href="https://www.instagram.com/231pic/" target="_blank">Instagram: @231pic</a>
                </div>
                <form action="https://formspree.io/f/mqeypbgy" method="POST">
                    <div class="form-group">
                        <label for="name">성함</label>
                        <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
                    </div>
                    <div class="form-group">
                        <label for="company">회사명/브랜드명</label>
                        <input type="text" id="company" name="company" placeholder="회사명 또는 브랜드명을 입력해주세요">
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" placeholder="example@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="5" placeholder="제휴 제안 내용을 상세히 입력해주세요" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의 보내기</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 231. All Rights Reserved.</p>
            <div class="socials">
                <a href="https://www.instagram.com/231pic/" target="_blank">Instagram</a>
                <a href="#">VSCO</a>
                <a href="#">Twitter</a>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
