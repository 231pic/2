<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>231PIC | Exhibition</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="film-grain"></div>
    <div class="custom-cursor" id="cursor"></div>

    <!-- 로딩 스크린 -->
    <div id="preloader">
        <div class="loader-logo">231PIC</div>
        <div class="loader-line"></div>
        <div class="loader-progress" id="progressText">00</div>
    </div>

    <!-- BGM 플레이어 (UI 유지) -->
    <div class="bgm-player">
        <span class="bgm-btn" style="opacity: 0.3; cursor: default;">LO-FI VIBE</span>
        <div class="bgm-line"></div>
        <button class="bgm-btn hovered-area" id="bgmToggle">PLAY SOUND</button>
    </div>

    <nav>
        <div class="logo hovered-area" onclick="closeAllModals()">231PIC</div>
        <div class="menu">
            <button class="nav-link hovered-area" onclick="openModal('aboutModal')">About</button>
            <button class="nav-link hovered-area" onclick="openModal('guestbookModal')">Guestbook</button>
            <button class="nav-link hovered-area" onclick="openModal('contactModal')">Contact</button>
        </div>
    </nav>

    <main>
        <!-- 뷰 컨트롤러 -->
        <div class="view-controls">
            <button class="view-btn active hovered-area" id="btnSlider" onclick="setViewMode('slider')">SLIDE</button>
            <button class="view-btn hovered-area" id="btnGrid" onclick="setViewMode('grid')">BOARD</button>
        </div>

        <!-- 네비게이션 버튼 (슬라이드 모드 전용) -->
        <button class="nav-btn prev-btn hovered-area" id="prevBtn" onclick="changeSlide(-1)">&#10092;</button>
        <button class="nav-btn next-btn hovered-area" id="nextBtn" onclick="changeSlide(1)">&#10093;</button>

        <div class="slider-viewport" id="viewport">
            <div class="slider-track" id="sliderTrack">
                <!-- 폴라로이드 사진들이 JS로 주입됩니다 -->
            </div>
        </div>
    </main>

    <!-- 사진 상세 및 댓글 모달 -->
    <div id="photoDetailModal" class="modal-overlay">
        <button class="modal-close hovered-area" onclick="closeAllModals()">×</button>
        <div class="modal-content detail-view">
            <div class="detail-container">
                <div class="detail-photo-frame">
                    <div class="tape"></div>
                    <img id="detailImg" src="" alt="">
                </div>
                <div class="detail-info">
                    <h2 id="detailTitle">Title</h2>
                    <p id="detailCategory">Category</p>
                    <div class="disqus-wrapper">
                        <div id="disqus_thread"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- About 모달 -->
    <div id="aboutModal" class="modal-overlay">
        <button class="modal-close hovered-area" onclick="closeAllModals()">×</button>
        <div class="modal-content info-card">
            <h2>The Visual Archive</h2>
            <div class="line"></div>
            <p>시선이 머무는 찰나의 순간을 기록합니다.<br>231PIC, Seoul.</p>
            <div class="social-links">
                <a href="https://www.instagram.com/231pic/" target="_blank" class="contact-btn hovered-area">INSTAGRAM</a>
            </div>
        </div>
    </div>

    <!-- 방명록 모달 -->
    <div id="guestbookModal" class="modal-overlay">
        <button class="modal-close hovered-area" onclick="closeAllModals()">×</button>
        <div class="modal-content info-card">
            <h2>Guestbook</h2>
            <div class="line"></div>
            <form id="guestbook-form" class="museum-form">
                <input type="text" id="gb-name" placeholder="NAME" required>
                <textarea id="gb-message" placeholder="MESSAGE" rows="3" required></textarea>
                <button type="submit" class="contact-btn hovered-area">LEAVE A NOTE</button>
            </form>
            <div id="guestbook-entries" class="museum-entries"></div>
        </div>
    </div>

    <!-- Contact 모달 -->
    <div id="contactModal" class="modal-overlay">
        <button class="modal-close hovered-area" onclick="closeAllModals()">×</button>
        <div class="modal-content info-card">
            <h2>Get in Touch</h2>
            <div class="line"></div>
            <p>제휴 및 협업 제안을 남겨주세요.</p>
            <form action="https://formspree.io/f/mqeypbgy" method="POST" class="museum-form">
                <input type="text" name="name" placeholder="NAME" required>
                <input type="email" name="_replyto" placeholder="EMAIL" required>
                <textarea name="message" placeholder="MESSAGE" rows="4" required></textarea>
                <button type="submit" class="contact-btn hovered-area">SEND EMAIL</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.origin;
            this.page.identifier = 'home';
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://231pic.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
